<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sinemax — App Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#05080F;overflow:hidden;font-family:"DM Sans",system-ui,sans-serif;
    background-image:radial-gradient(1000px 700px at 50% -10%,rgba(45,142,255,.1),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}
  #scaler{transform-origin:center center}
  /* hide scrollbars on rails/scrolls */
  .sx-rail::-webkit-scrollbar,.sx-scroll::-webkit-scrollbar{width:0;height:0;display:none}
  .sx-rail,.sx-scroll{-ms-overflow-style:none;scrollbar-width:none}
  input::placeholder,textarea::placeholder{color:#5E7298}

  /* ---- screen transitions ---- (base = visible end-state; animate only when motion allowed) */
  .sx-screen{position:absolute;inset:0;display:flex;flex-direction:column}
  @keyframes sxIn{from{opacity:0;transform:translateY(8px) scale(.992)}to{opacity:1;transform:none}}
  @keyframes sxUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
  @keyframes sxFade{from{opacity:0}to{opacity:1}}
  @keyframes sxSheet{from{transform:translateY(100%)}to{transform:none}}
  @keyframes sxToast{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes sxExpand{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: no-preference){
    .sx-screen{animation:sxIn .32s cubic-bezier(.22,1,.36,1)}
    .sx-screen-detail{animation:sxUp .36s cubic-bezier(.22,1,.36,1)}
    .sx-fade{animation:sxFade .25s ease}
    .sx-sheet{animation:sxSheet .34s cubic-bezier(.22,1,.36,1)}
    .sx-toast{animation:sxToast .3s cubic-bezier(.22,1,.36,1)}
    .sx-expand{animation:sxExpand .34s cubic-bezier(.22,1,.36,1)}
  }

  /* ---- splash ---- */
  .sx-dots{display:inline-flex;gap:7px}
  .sx-dots span{width:7px;height:7px;border-radius:50%;background:#2D8EFF;opacity:.4;animation:sxDot 1.1s infinite ease-in-out}
  .sx-dots span:nth-child(2){animation-delay:.18s}.sx-dots span:nth-child(3){animation-delay:.36s}
  @keyframes sxDot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  .sx-sheen{position:absolute;top:-10%;left:0;width:70px;height:120%;opacity:0;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg)}
  @media (prefers-reduced-motion: no-preference){
  /* shimmer */
  .sx-splash-shimmer .sx-sheen{animation:sxSheen 2.4s .3s infinite}
  .sx-splash-shimmer .sx-logo{animation:sxBreathe 2.6s ease-in-out infinite}
  /* pulse */
  .sx-splash-pulse .sx-logo{animation:sxPulse 1.8s ease-in-out infinite}
  .sx-ring{animation:sxRing 1.8s ease-out infinite}
  /* build */
  .sx-splash-build .sx-logo{animation:sxRise .9s cubic-bezier(.22,1,.36,1) both}
  .sx-splash-build .sx-line{animation:sxDraw .7s .55s cubic-bezier(.22,1,.36,1) both}
  .sx-splash-build .sx-tag{animation:sxFadeUp .6s .9s ease both}
  }
  @keyframes sxSheen{0%{left:-30%;opacity:0}30%{opacity:1}60%{left:115%;opacity:0}100%{left:115%;opacity:0}}
  @keyframes sxBreathe{0%,100%{filter:drop-shadow(0 0 22px rgba(45,142,255,.5))}50%{filter:drop-shadow(0 0 38px rgba(45,142,255,.85))}}
  @keyframes sxPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 24px rgba(45,142,255,.55))}50%{transform:scale(1.05);filter:drop-shadow(0 0 46px rgba(45,142,255,.95))}}
  .sx-ring{position:absolute;top:50%;left:50%;width:120px;height:120px;border-radius:50%;border:1.5px solid rgba(45,142,255,.6);
    transform:translate(-50%,-50%)}
  @keyframes sxRing{0%{width:120px;height:120px;opacity:.7}100%{width:340px;height:340px;opacity:0}}
  @keyframes sxRise{from{opacity:0;transform:translateY(22px);letter-spacing:14px;filter:blur(6px)}to{opacity:1;transform:none;filter:none}}
  @keyframes sxDraw{from{width:0;opacity:0}to{width:150px;opacity:1}}
  @keyframes sxFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="stage"><div id="scaler"><div id="root"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sinemax-icons.jsx"></script>
<script type="text/babel" src="sinemax-parts.jsx"></script>
<script type="text/babel" src="sinemax-screens.jsx"></script>
<script type="text/babel" src="sinemax-screens2.jsx"></script>
<script type="text/babel" src="sinemax-detail.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const T = window.SXT;
const { Phone, StatusBar, BottomNav, GesturePill } = window.SX;
const { Splash, Home, SearchScreen, Discover } = window.SXScreens;
const { Requests, Library, Profile } = window.SXScreens2;
const { Detail } = window.SXDetail;

const TABS = ["home", "discover", "requests", "library", "profile"];
const LS = (k, v) => { try { v === undefined ? null : localStorage.setItem(k, v); return localStorage.getItem(k); } catch (e) { return null; } };

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "navStyle": "underline",
  "splashStyle": "build"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const stored = LS("sx_view");
  const restoreTab = TABS.includes(stored) ? stored : "home";
  const [view, setView] = useState("splash");
  const [detailId, setDetailId] = useState(LS("sx_detail") || "ks2");
  const [tab, setTab] = useState(restoreTab);
  const [splashKey, setSplashKey] = useState(0);

  // persist
  useEffect(() => { LS("sx_view", view); }, [view]);
  useEffect(() => { LS("sx_detail", detailId); }, [detailId]);

  // splash auto-nav
  useEffect(() => {
    if (view !== "splash") return;
    const id = setTimeout(() => setView(restoreTab), 2600);
    return () => clearTimeout(id);
  }, [view, splashKey]);

  const open = (id) => { setDetailId(id); setView("detail"); };
  const goTab = (id) => { setTab(id); setView(id); };
  const replaySplash = () => { setView("splash"); setSplashKey((k) => k + 1); };

  const navVisible = TABS.includes(view);

  let screen = null, cls = "sx-screen", key = view;
  if (view === "home") screen = <Home onOpen={open} onSearch={() => setView("search")} />;
  else if (view === "discover") screen = <Discover onOpen={open} onSearch={() => setView("search")} />;
  else if (view === "requests") screen = <Requests />;
  else if (view === "library") screen = <Library onOpen={open} />;
  else if (view === "profile") screen = <Profile />;
  else if (view === "search") screen = <SearchScreen onOpen={open} onBack={() => setView(tab)} />;
  else if (view === "detail") { screen = <Detail id={detailId} onBack={() => setView(tab)} onOpen={open} />; cls += " sx-screen-detail"; key = "detail-" + detailId; }

  return (
    <>
      <Phone>
        <StatusBar />
        <div style={{ flex: 1, position: "relative", overflow: "hidden", display: "flex" }}>
          {view !== "splash" && <div key={key} className={cls}>{screen}</div>}
          {navVisible && <BottomNav active={tab} onChange={goTab} variant={t.navStyle} />}
          {view === "splash" && <div key={"splash-" + splashKey}><Splash variant={t.splashStyle} /></div>}
        </div>
        <GesturePill />
      </Phone>

      <TweaksPanel>
        <TweakSection label="Bottom navigation" />
        <TweakRadio label="Nav style" value={t.navStyle}
          options={["glowpill", "floating", "underline"]}
          onChange={(v) => setTweak("navStyle", v)} />
        <TweakSection label="Splash screen" />
        <TweakRadio label="Animation" value={t.splashStyle}
          options={["shimmer", "pulse", "build"]}
          onChange={(v) => setTweak("splashStyle", v)} />
        <TweakButton label="▶  Replay splash" onClick={replaySplash} />
      </TweaksPanel>
    </>
  );
}

// ---- responsive scaler ----
function fit() {
  const pad = 28, W = 412 + 22, H = 892 + 22;
  const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H);
  document.getElementById("scaler").style.transform = "scale(" + Math.min(s, 1.15) + ")";
}
window.addEventListener("resize", fit); fit();

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
