name: sinemax
description: "Sinemax — Translated Movies & Series streaming app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.12.4
  cached_network_image_ce: ^4.1.0
  flutter_svg: ^2.3.0
  flutter_animate: ^4.5.2
  skeletonizer: ^2.1.3
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  hive_ce: ^2.16.0
  hive_ce_flutter: ^2.2.0
  freezed_annotation: ^3.1.0 
  json_annotation: ^4.9.0
  firebase_messaging: ^16.3.0
  firebase_core: ^4.10.0
  flutter_local_notifications: ^19.4.2
  background_downloader: ^9.2.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  readmore: ^3.0.0
  disk_space_plus: ^0.2.6
  path_drawing: ^1.0.1
  url_launcher: ^6.3.1
  font_awesome_flutter: ^11.0.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0          # ← CHANGE THIS (was ^2.15.0)
  build_runner: ^2.15.0           # ← keep as-is, it's fine
  riverpod_generator: ^4.0.3      # ← add this
  freezed: ^3.2.5                 # ← upgraded from ^2.x
  json_serializable: ^6.8.0
  hive_ce_generator: ^1.11.0      # ← add if using fromJson
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.3

# App launcher icons — generated from assets/logo.png across all platforms.
flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#050D1A"
  adaptive_icon_foreground: "assets/logo.png"
  web:
    generate: true
    background_color: "#050D1A"
    theme_color: "#050D1A"
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: true

# Native splash screen — solid brand background, no logo (the in-app
# SplashScreen draws the animated logo once Flutter is running).
flutter_native_splash:
  color: "#050D1A"
  image: assets/logo2.png
  android_12:
    color: "#050D1A"
    image: assets/logo2.png



flutter:
  uses-material-design: true

  assets:
    - .env
